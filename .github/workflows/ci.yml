name: ci

on:
  push:
  pull_request:

jobs:
  acceptance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run kb.py acceptance harness
        run: python3 tests/run_acceptance.py
